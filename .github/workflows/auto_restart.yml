name: Pella 自动监控 - 离线才重启
on:
  schedule:
    - cron: "*/30 * * * *"  # 30分钟检测一次
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PTERO_URL: ${{ secrets.PTERO_URL }}
      SERVER_ID: ${{ secrets.SERVER_ID }}
      API_KEY: ${{ secrets.API_KEY }}
      RESTART_URL: ${{ secrets.RESTART_URL }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: 检测状态 + 离线才重启
        run: |
          echo "🔍 正在检查服务器状态..."

          # 获取服务器资源状态（修复接口）
          res=$(curl -s "https://www.pella.app/api/client/servers/$SERVER_ID/resources" \
            -H "Authorization: Bearer $API_KEY")

          # 正确提取运行状态
          status=$(echo "$res" | grep -o '"current_state":"[^"]*"' | cut -d'"' -f4)
          echo "✅ 当前状态：$status"

          # 只有离线才重启
          if [[ "$status" != "running" && "$status" != "starting" ]]; then
            echo "❌ 服务器离线 → 开始重启"
            
            # 调用你已经成功的 Workers
            curl -s "$RESTART_URL"
            
            # TG 通知
            curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="❌ Pella 服务器离线，已自动重启 ✅"
          else
            echo "✅ 服务器正常，不操作"
          fi
