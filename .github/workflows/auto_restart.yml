- name: 检测服务器状态 + 自动重启
  run: |
    echo "🔍 正在检测服务器状态..."
    RES=$(curl -s -H "Authorization: Bearer $API_KEY" \
      "$PTERO_URL/api/client/servers/$SERVER_ID/resources")
    
    STATE=$(echo "$RES" | grep -o '"current_state":"[^"]*"' | cut -d'"' -f4)
    echo "📊 当前状态：$STATE"

    if [[ "$STATE" != "running" && "$STATE" != "starting" ]]; then
      echo "❌ 服务器离线，正在调用重启 API..."

      # 调用重启 API，并捕获返回结果
      RESPONSE=$(curl -s -w "%{http_code}" -X POST \
        -H "Authorization: Bearer $API_KEY" \
        -H "Content-Type: application/json" \
        -d '{"action":"restart"}' \
        "$PTERO_URL/api/client/servers/$SERVER_ID/power")
      
      HTTP_CODE=${RESPONSE: -3}
      echo "🔌 API 响应码：$HTTP_CODE"

      if [[ "$HTTP_CODE" == "204" || "$HTTP_CODE" == "200" ]]; then
        echo "✅ 重启指令发送成功"
        curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
          -d chat_id="$TG_CHAT_ID" \
          -d text="✅ Pella 服务器离线，重启指令已成功发送！"
      else
        echo "❌ 重启 API 调用失败，HTTP 码：$HTTP_CODE"
        curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
          -d chat_id="$TG_CHAT_ID" \
          -d text="❌ Pella 服务器离线，但重启失败！API 响应码：$HTTP_CODE"
      fi
    else
      echo "✅ 服务器正常运行"
    fi
