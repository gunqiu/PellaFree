name: Pella 服务器监控 + 调用 Workers 重启
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PTERO_URL: ${{ secrets.PTERO_URL }}
      SERVER_ID: ${{ secrets.SERVER_ID }}
      API_KEY: ${{ secrets.API_KEY }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      RESTART_URL: ${{ secrets.RESTART_URL }}

    steps:
      - name: 检测状态 + 调用 Workers 重启
        run: |
          echo "🔍 检测服务器状态..."
          # 用之前修正的路径检测状态
          RES=$(curl -s -L \
            -H "Authorization: Bearer $API_KEY" \
            "$PTERO_URL/api/client/servers/$SERVER_ID")
          
          STATE=$(echo "$RES" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
          echo "✅ 当前状态: $STATE"

          if [[ "$STATE" != "running" && "$STATE" != "starting" ]]; then
            echo "❌ 服务器离线，调用 Workers 重启..."
            # 直接调用你的 Workers 接口
            curl -s "$RESTART_URL"
            echo "✅ 已触发 Workers 重启任务"
            curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="❌ Pella 服务器离线 → 已通过 Workers 触发重启"
          else
            echo "✅ 服务器正常运行"
          fi
