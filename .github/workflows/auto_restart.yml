name: Pella 服务器监控 + 自动重启（修复版）
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PTERO_URL: ${{ secrets.PTERO_URL }}
      SERVER_ID: ${{ secrets.SERVER_ID }}
      API_KEY: ${{ secrets.API_KEY }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: 检测状态 + 自动重启
        run: |
          # ========== 检测状态 ==========
          echo "🔍 检测服务器状态..."
          RES=$(curl -s -L \
            -H "Authorization: Bearer $API_KEY" \
            "$PTERO_URL/api/client/servers/$SERVER_ID/resources")

          echo "📄 API返回内容: $RES"
          STATE=$(echo "$RES" | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
          echo "✅ 解析状态: $STATE"

          # ========== 判断是否离线 ==========
          if [[ "$STATE" != "running" && "$STATE" != "starting" ]]; then
            echo "❌ 服务器离线，开始重启..."

            # ========== 真正的重启 API ==========
            curl -s -L -X POST \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"signal":"restart"}' \
              "$PTERO_URL/api/client/servers/$SERVER_ID/signals"

            echo "✅ 重启指令已发送"
            curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="❌ Pella 服务器离线 → 已自动重启"
          else
            echo "✅ 服务器正常"
          fi
